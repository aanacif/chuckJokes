<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="This is a Chuck Norris random jokes generator website">
  <meta name="google-site-verification" content="f3i5NLTX2aaODXSLb6ohXkBjWD20qe5keZt2riAA4-w" />
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200&family=Zilla+Slab+Highlight&display=swap"
    rel="stylesheet">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="icon" href="favicon.ico">
  <title>Chuck Norris Jokes</title>

</head>

<body>
  <nav class="main-nav">
    <img src="./img/chuckLogo.png" alt="Chuck Logo" id="logo">
    <ul class="site-desc">
      <li>Joke Generator</li>
    </ul>
  </nav>

  <div class="home-container">

    <div class="content-wrap">
      <div id="intro"></div>
      <p>Step 1. Select amount of jokes</p>
      <p>Step 2. (Optional) Select a category</p>
      <p>Step 3. Click the "GENERATE" button.</p>


      <form id="pickNumber">
        <label for="number" class="number">List size (# of jokes)</label>
        <input id="number" type="number" min="1" max="99">
        <p>Categories:</p>
        <div id="categories">
          <input id="nerdy" name="nerdy" type="checkbox" class="category"> Nerdy
          <input id="explicit" name="explicit" type="checkbox" class="category"> Explicit
        </div>

        <button type="submit" id="get-jokes">Generate</button>
      </form>
      <div id="ticks"></div>
      <ul id="jokeList"></ul>

      <br>
    </div>

    <footer>
      <div class="main-footer">
        <p>Copyright &copy; 2021. All rights reserved.</p>
        <a href="https://tagcity.netlify.app" target="_blank"> <img src="./img/logo6.png" alt="tagcity Logo"></a>
      </div>
    </footer>
  </div>

  <script type="module" src="./js/app.js"></script>


</body>

</html>
