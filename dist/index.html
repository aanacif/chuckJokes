<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chuck Norris random jokes generator">
  <meta name="google-site-verification" content="f3i5NLTX2aaODXSLb6ohXkBjWD20qe5keZt2riAA4-w" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    integrity="sha512-iBBXm8fW90+nuLcSKlbmrPcLa0OT92xO1BIsZ+ywDWZCvqsWgccV3gFoRBv0z+8dLJgyAHIhR35VZc2oM/gI1w=="
    crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="icon" href="favicon.ico">
  <title>Chuck Norris Jokes</title>

</head>

<body>
  <nav class="main-nav">
    <img src="./img/chuckLogo.png" alt="Chuck Logo" id="logo">
    <ul class="site-desc">
      <li>Joke Generator</li>
    </ul>
  </nav>

  <div class="home-container">

    <div class="content-wrap">
      <p>Hey everybody, Chuck Norris is here.</p>
      <p>Choose the amount of jokes you want and a random list will be displayed everytime you click the
        "GENERATE" button.</p>
      <p>Have fun!</p>

      <form id="pickNumber">
        <label for="number" class="number">List size (# of jokes)</label>
        <input id="number" type="number" min="1" max="99">
        <p>This is optional, but you can also select a category:</p>
        <div id="categories">
          <input id="nerdy" name="nerdy" type="checkbox" class="category"> Nerdy
          <input id="explicit" name="explicit" type="checkbox" class="category"> Explicit
        </div>

        <button type="submit" id="get-jokes">Generate</button>
      </form>
      <div id="ticks"></div>
      <ul id="jokeList"></ul>

      <br>
    </div>

    <footer>
      <div class="main-footer">
        <p>Copyright &copy; 2021. All rights reserved.</p>
        <a href="https://tagcity.netlify.app" target="_blank"> <img src="./img/logo6.png" alt="tagcity Logo"></a>
        <div class="social">
          <a href="#" target="_blank"><i class="fab fa-twitter fa-2x"></i></a>
          <a href="#" target="_blank"><i class="fab fa-github fa-2x"></i></a>
          <a href="#" target="_blank"><i class="fab fa-linkedin fa-2x"></i></a>
        </div>
      </div>
    </footer>
  </div>

  <script type="module" src="./js/app.js"></script>

</body>

</html>
