<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    integrity="sha512-iBBXm8fW90+nuLcSKlbmrPcLa0OT92xO1BIsZ+ywDWZCvqsWgccV3gFoRBv0z+8dLJgyAHIhR35VZc2oM/gI1w=="
    crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="icon" href="favicon.ico">
  <title>Chuck Norris Jokes</title>

</head>

<body>
  <nav class="main-nav">
    <img src="./img/chuckLogo.png" alt="Chuck Logo" id="logo">
    <ul class="site-desc">
      <li>Joke Generator</li>
    </ul>
  </nav>

  <div class="home-container">

    <div class="content-wrap">
      <p>A random list of Chuck Norris jokes will be generated everytime you click the
        "GET JOKES" button.</p>
      <p>All you have to do is choose the amount of jokes
        by entering a value below.</p>
      <p>Wanna use a different name? Here you go:</p>
      <div class="customName">
        <label for="firstName" class="firstName">First Name</label>
        <input id="firstName" type="text">
        <label for="lastName" class="lastName">Last Name</label>
        <input id="lastName" type="text">
      </div>

      <div class="pickNumber">
        <label for="number" class="number">Number of jokes <span class="greater">(greater than 0)</span></label>
        <input id="number" type="number">
        <button class="get-jokes">Get Jokes</button>
      </div>
      <ul class="jokeList"></ul>

      <br>
    </div>

    <footer>
      <div class="main-footer">
        <p>Copyright &copy; 2021. All rights reserved.</p>
        <a href="https://tagcity.netlify.app" target="_blank"> <img src="./img/logo6.png" alt="tagcity Logo"></a>
        <div class="social">
          <a href="#" target="_blank"><i class="fab fa-twitter fa-2x"></i></a>
          <a href="#" target="_blank"><i class="fab fa-facebook fa-2x"></i></a>
          <a href="#" target="_blank"><i class="fab fa-github fa-2x"></i></a>
          <a href="#" target="_blank"><i class="fab fa-linkedin fa-2x"></i></a>
        </div>
      </div>
    </footer>
  </div>

  <script src="./js/app.js"></script>
</body>

</html>
